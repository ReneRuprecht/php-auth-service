services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      APP_ENV: dev

  nginx:
    container_name: app_nginx
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./backend:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
